name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npx ng build --base-href /BabysittingCalculator/

      - name: Copy index.html to 404.html
        run: cp dist/babysitting-calculator/browser/index.html dist/babysitting-calculator/browser/404.html

      - name: Add .nojekyll
        run: touch dist/babysitting-calculator/browser/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/babysitting-calculator/browser

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
