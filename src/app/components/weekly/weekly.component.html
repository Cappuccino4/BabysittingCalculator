<div class="weekly-page page">

  <!-- ── Week header ──────────────────────────────────────────────── -->
  <header class="week-header">
    <div class="week-nav-row">
      <button class="icon-btn" (click)="prevWeek()" aria-label="Previous week">
        <lucide-icon [img]="ChevronLeftIcon" [size]="20"></lucide-icon>
      </button>

      <div class="week-center">
        <span class="week-label">{{ weekLabel() }}</span>
        @if (!isCurrentWeek()) {
          <button class="today-chip" (click)="goToToday()">This Week</button>
        }
      </div>

      <div class="week-right">
        <button class="icon-btn" (click)="showSettings.set(true)" aria-label="Settings">
          <lucide-icon [img]="Settings2Icon" [size]="18"></lucide-icon>
        </button>
        <button class="icon-btn" (click)="nextWeek()" aria-label="Next week">
          <lucide-icon [img]="ChevronRightIcon" [size]="20"></lucide-icon>
        </button>
      </div>
    </div>

    <div class="week-total-row">
      <span class="week-total-label">Week Total</span>
      <span class="week-total-amount">${{ weekStats().grandTotal.toFixed(2) }}</span>
    </div>
  </header>

  <!-- ── Day cards ────────────────────────────────────────────────── -->
  <div class="days-list">
    @for (day of weekDays(); track day.toISOString()) {
      <app-day-card
        [date]="day"
        [blocks]="weekBlocks()"
        [rates]="rates()"
        [todayStr]="todayStr"
        (addBlock)="openAddTimeBlock($event)"
        (editBlock)="openEditTimeBlock($event)"
        (deleteBlock)="onDeleteTimeBlock($event)"
      />
    }
  </div>

  <!-- ── Weekly summary + extras ──────────────────────────────────── -->
  <app-weekly-summary
    [weekStats]="weekStats()"
    [extras]="weekExtras()"
    [rates]="rates()"
    (addExtra)="openAddExtra()"
    (editExtra)="openEditExtra($event)"
    (deleteExtra)="onDeleteExtra($event)"
  />

</div>

<!-- ── Modals ──────────────────────────────────────────────────────── -->
@if (showTimeBlockForm()) {
  <app-time-block-form
    [block]="editingBlock()"
    [defaultDate]="formDefaultDate()"
    [rates]="rates()"
    [allBlocks]="weekBlocks()"
    (save)="onSaveTimeBlock($event)"
    (closeModal)="closeTimeBlockForm()"
  />
}

@if (showExtraForm()) {
  <app-extra-form
    [extra]="editingExtra()"
    [weekKey]="currentWeekKey()"
    (save)="onSaveExtra($event)"
    (closeModal)="closeExtraForm()"
  />
}

@if (showSettings()) {
  <app-settings-modal
    [rates]="rates()"
    (save)="onSaveSettings($event)"
    (closeModal)="showSettings.set(false)"
  />
}
